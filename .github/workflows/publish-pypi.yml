name: Publish to PyPI

# Publishes the package to PyPI when a version tag is pushed (e.g. v0.1.0), or on demand.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo or in secrets.
# The version that gets published is the one in pyproject.toml, not the tag string.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing (mint the OIDC token)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
