name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codeautopsy
          POSTGRES_PASSWORD: codeautopsy
          POSTGRES_DB: codeautopsy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://codeautopsy:codeautopsy@localhost:5432/codeautopsy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the provenance tests git-blame this repo itself

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e ".[dev,fixbot]"

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy codeautopsy

      - name: Pytest with coverage
        run: pytest --cov=codeautopsy --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
