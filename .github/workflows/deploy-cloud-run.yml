name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  PROJECT_ID: codeautopsy-hackathon
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/codeautopsy-hackathon/codeautopsy/app
  CLOUDSQL_INSTANCE: codeautopsy-hackathon:us-central1:codeautopsy-db

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: projects/182653908302/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@codeautopsy-hackathon.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy provenance service
        run: |
          gcloud run deploy codeautopsy-provenance \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --command=codeautopsy-provenance \
            --port=8100 --min-instances=1 --max-instances=1 --memory=512Mi \
            --add-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }} \
            --set-secrets="DATABASE_URL=codeautopsy-database-url:latest,JWT_SECRET=codeautopsy-jwt-secret:latest" \
            --set-env-vars="CODEAUTOPSY_PROVENANCE_URL=http://0.0.0.0:8100,CODEAUTOPSY_TARGET_REPO=/app" \
            --allow-unauthenticated --quiet

      - name: Get provenance service URL
        id: provenance
        run: |
          url=$(gcloud run services describe codeautopsy-provenance \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Deploy sample-app service
        run: |
          gcloud run deploy codeautopsy-sample-app \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} \
            --command=codeautopsy-sample \
            --port=8000 --memory=512Mi \
            --set-secrets="SIGNOZ_INGESTION_KEY=codeautopsy-signoz-ingestion-key:latest" \
            --set-env-vars="CODEAUTOPSY_PROVENANCE_URL=${{ steps.provenance.outputs.url }},CODEAUTOPSY_TARGET_REPO=/app,CODEAUTOPSY_RUNTIME_SERVICE=checkout-api,OTEL_EXPORTER_OTLP_ENDPOINT=https://ingest.in2.signoz.cloud:443" \
            --allow-unauthenticated --quiet
