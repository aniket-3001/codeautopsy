name: Auto-Heal

# The payoff loop. A real SigNoz alert on the sample app's crash metric (codeautopsy.crashes)
# fires the hosted API's heal webhook, which fires this via repository_dispatch. The Fix Bot
# is handed its own autopsy, patches the seeded bug, proves the fix with a regression test,
# opens a PR, and reports the result back to the dashboard's Auto-Heal timeline.

on:
  repository_dispatch:
    types: [autoheal]

permissions:
  contents: write # the Fix Bot pushes a branch
  pull-requests: write # ...and opens a PR

jobs:
  heal:
    runs-on: ubuntu-latest
    env:
      HEAL_ORG_ID: ${{ github.event.client_payload.org_id }}
      HEAL_CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
      HEAL_WEBHOOK_SECRET: ${{ secrets.HEAL_WEBHOOK_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history — the Fix Bot resolves the crashing line back through blame

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -e .

      - name: Resolve fix coordinates
        id: coords
        run: |
          COMMIT="${{ github.event.client_payload.commit }}"
          if [ -z "$COMMIT" ]; then COMMIT="$(git rev-parse HEAD)"; fi
          FILE="${{ github.event.client_payload.file }}"
          if [ -z "$FILE" ]; then FILE="codeautopsy/sample_app/main.py"; fi
          LINE="${{ github.event.client_payload.line }}"
          if [ -z "$LINE" ] || [ "$LINE" = "0" ]; then LINE="91"; fi
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "line=$LINE" >> "$GITHUB_OUTPUT"

      - name: Fix Bot — patch, verify, open PR
        env:
          GH_TOKEN: ${{ github.token }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          git config user.name "codeautopsy-fixbot"
          git config user.email "fixbot@codeautopsy.dev"
          # Never abort on a non-zero exit: `codeautopsy fix --json` exits 1 when it can't
          # verify a fix, but we still want to report that outcome back cleanly.
          set +e
          codeautopsy fix \
            "${{ steps.coords.outputs.commit }}" \
            "${{ steps.coords.outputs.file }}" \
            "${{ steps.coords.outputs.line }}" \
            --push --json | tee fix_result.json
          echo "codeautopsy fix finished"

      - name: Report the outcome back to CodeAutopsy
        if: always()
        run: python scripts/report_heal.py fix_result.json
