<script>
const API = "https://codeautopsy-provenance-3bczbiamba-uc.a.run.app";
const SIGNOZ_CONSOLE = "https://mighty-bonefish.in2.signoz.cloud";
const BLAST_RADIUS_DASHBOARD = `${SIGNOZ_CONSOLE}/dashboard/019f94fb-637b-794f-a675-62cf18335de0`;

// --- tiny auth-state helpers -------------------------------------------------------------
function getToken() { return localStorage.getItem("ca_token"); }
function getEmail() { return localStorage.getItem("ca_email") || ""; }
function setSession(token, email) {
  localStorage.setItem("ca_token", token);
  localStorage.setItem("ca_email", email);
}
function clearSession() {
  localStorage.removeItem("ca_token");
  localStorage.removeItem("ca_email");
}
function authHeaders() { return { Authorization: "Bearer " + getToken() }; }

async function api(path, opts) {
  opts = opts || {};
  const headers = Object.assign({ "Content-Type": "application/json" }, opts.headers || {});
  const r = await fetch(API + path, {
    method: opts.method || "GET",
    headers,
    body: opts.body ? JSON.stringify(opts.body) : opts.rawBody,
  });
  let data = null;
  try { data = await r.json(); } catch (e) { /* empty body */ }
  if (!r.ok) {
    if (r.status === 401) clearSession();
    const detail = (data && data.detail) ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : ("HTTP " + r.status);
    throw new Error(detail);
  }
  return data;
}

function hex(n) {
  let s = "";
  while (s.length < n) s += Math.floor(Math.random() * 16).toString(16);
  return s.slice(0, n);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function fmtDate(iso) {
  try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
}

function dayKey(iso) {
  try { return new Date(iso).toISOString().slice(0, 10); } catch (e) { return ""; }
}

function signozTraceLink(traceId, spanId) {
  if (!traceId) return null;
  return `${SIGNOZ_CONSOLE}/trace/${traceId}${spanId ? "?spanId=" + spanId : ""}`;
}

// Copy `text` and flash confirmation on the clicked button. Falls back to a hidden
// textarea + execCommand for browsers/contexts where navigator.clipboard is unavailable.
async function copyToClipboard(text, btn) {
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    }
    if (btn) {
      const prev = btn.textContent;
      btn.textContent = "✓ Copied!";
      btn.classList.add("!border-emerald-400/50", "!text-emerald-500");
      setTimeout(() => {
        btn.textContent = prev;
        btn.classList.remove("!border-emerald-400/50", "!text-emerald-500");
      }, 1500);
    }
  } catch (e) {
    if (btn) btn.textContent = "copy failed — select manually";
  }
}

// --- playground key: one ephemeral X-Api-Key per page session, held only in memory --------
let _pgKey = null;
async function playgroundKey() {
  if (_pgKey) return _pgKey;
  const created = await api("/v1/keys", { method: "POST", headers: authHeaders(), rawBody: "" });
  _pgKey = created.key;
  return _pgKey;
}

// --- tiny chart helpers (no external libs — inline SVG/CSS) -------------------------------
function barRows(items) {
  const max = Math.max(1, ...items.map((i) => i.value));
  return items.map((i) => `
    <div class="mt-2.5 first:mt-0">
      <div class="flex items-baseline justify-between gap-2">
        <span class="mono truncate text-xs text-zinc-500 dark:text-zinc-400">${esc(i.label)}</span>
        <span class="mono text-xs text-zinc-400">${i.value}</span>
      </div>
      <div class="mt-1 h-1.5 rounded-full bg-zinc-200 dark:bg-zinc-800">
        <div class="h-1.5 rounded-full bg-gradient-to-r from-cyan-500 to-indigo-500" style="width:${Math.round((i.value / max) * 100)}%"></div>
      </div>
    </div>`).join("");
}

function ring(pct, label) {
  const p = Math.max(0, Math.min(100, Math.round(pct)));
  return `
    <div class="flex items-center gap-4">
      <div class="grid h-20 w-20 place-items-center rounded-full" style="background:conic-gradient(#22d3ee ${p}%, rgba(148,163,184,.18) 0)">
        <div class="grid h-14 w-14 place-items-center rounded-full bg-[#f6f8fc] dark:bg-[#0a0e1a]">
          <span class="mono text-lg">${p}%</span>
        </div>
      </div>
      <div class="text-xs text-zinc-500 dark:text-zinc-400">${label}</div>
    </div>`;
}

function sparkBars(counts) {
  const max = Math.max(1, ...counts.map((c) => c.value));
  return `<div class="flex items-end gap-1" style="height:44px">${counts.map((c) => `
    <div class="group relative flex-1" title="${esc(c.label)}: ${c.value}">
      <div class="w-full rounded-t bg-gradient-to-t from-cyan-500/60 to-indigo-500/60" style="height:${Math.max(3, Math.round((c.value / max) * 44))}px"></div>
    </div>`).join("")}</div>`;
}

// --- modal ------------------------------------------------------------------------------
function openModal(html) {
  const root = document.getElementById("modal-root");
  root.innerHTML = `
    <div class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm" data-close></div>
    <div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto p-4 sm:p-8" data-close>
      <div class="card w-full max-w-lg" data-stop>${html}</div>
    </div>`;
  root.querySelectorAll("[data-close]").forEach((el) =>
    el.addEventListener("click", (e) => { if (e.target === el) closeModal(); })
  );
  const stop = root.querySelector("[data-stop]");
  if (stop) stop.addEventListener("click", (e) => e.stopPropagation());
}
function closeModal() { document.getElementById("modal-root").innerHTML = ""; }

// --- router -------------------------------------------------------------------------------
const PROTECTED = ["#/dashboard", "#/autopsy", "#/prognose", "#/leaderboard", "#/risk-gate", "#/autoheal", "#/integrate", "#/onboarding", "#/settings"];

function navigate(hash) { location.hash = hash; }

// Any live poll loop (Auto-Heal timeline) is torn down on every navigation.
let _healPollTimer = null;
function stopHealPoll() { if (_healPollTimer) { clearTimeout(_healPollTimer); _healPollTimer = null; } }

async function render() {
  stopHealPoll();
  let hash = location.hash || "#/";
  if (PROTECTED.includes(hash) && !getToken()) hash = "#/login";
  if ((hash === "#/login" || hash === "#/signup") && getToken()) hash = "#/dashboard";
  if (hash === "#/") hash = getToken() ? "#/dashboard" : "#/home";

  renderNav();
  const main = document.getElementById("main");
  main.innerHTML = '<p class="mono text-sm text-zinc-400">loading…</p>';

  try {
    if (hash === "#/home") return renderHome();
    if (hash === "#/signup") return renderAuthForm("signup");
    if (hash === "#/login") return renderAuthForm("login");
    if (hash === "#/onboarding") return await renderOnboarding();
    if (hash === "#/dashboard") return await renderDashboard();
    if (hash === "#/autopsy") return await renderAutopsy();
    if (hash === "#/prognose") return await renderPrognose();
    if (hash === "#/leaderboard") return await renderLeaderboard();
    if (hash === "#/risk-gate") return await renderRiskGate();
    if (hash === "#/autoheal") return await renderAutoheal();
    if (hash === "#/integrate") return await renderIntegrate();
    if (hash === "#/settings") return await renderSettings();
    main.innerHTML = '<p class="text-sm text-zinc-500">Not found.</p>';
  } catch (err) {
    main.innerHTML = `<div class="card border-red-400/40"><p class="text-sm text-red-500">${esc(err.message)}</p></div>`;
  }
}

const NAV_ITEMS = [
  ["#/dashboard", "Dashboard"],
  ["#/autopsy", "Live Autopsy"],
  ["#/prognose", "Prognosis"],
  ["#/leaderboard", "Leaderboard"],
  ["#/risk-gate", "Risk Gate"],
  ["#/autoheal", "Auto-Heal"],
  ["#/integrate", "Integrate"],
  ["#/settings", "Settings"],
];

function currentRoute() {
  const h = location.hash || "#/";
  return h === "#/" ? "#/dashboard" : h;
}

function navLink(href, label, { block = false } = {}) {
  const active = currentRoute() === href;
  const shape = block ? "block rounded-lg px-3 py-2.5" : "whitespace-nowrap rounded-lg px-3 py-1.5";
  const state = active
    ? "bg-indigo-500/10 text-indigo-600 dark:bg-indigo-400/15 dark:text-indigo-300"
    : "text-zinc-500 hover:bg-zinc-500/10 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100";
  return `<a href="${href}" aria-current="${active ? "page" : "false"}" class="${shape} transition ${state}">${label}</a>`;
}

function renderNav() {
  const nav = document.getElementById("nav");
  const mobile = document.getElementById("mobile-nav");
  if (!getToken()) {
    mobile.classList.add("hidden");
    mobile.innerHTML = "";
    nav.innerHTML = `
      ${navLink("#/login", "Log in")}
      <a href="#/signup" class="whitespace-nowrap rounded-full bg-zinc-950 px-4 py-1.5 text-xs font-medium text-white transition hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">Sign up</a>`;
    return;
  }

  const links = NAV_ITEMS.map(([h, l]) => navLink(h, l)).join("");
  nav.innerHTML = `
    <div class="hidden items-center gap-0.5 xl:flex">${links}</div>
    <span class="mono ml-2 hidden max-w-[14ch] truncate text-xs text-zinc-400 2xl:inline" title="${esc(getEmail())}">${esc(getEmail())}</span>
    <button id="btn-logout" class="ml-1 hidden whitespace-nowrap rounded-full bg-zinc-950 px-4 py-1.5 text-xs font-medium text-white transition hover:bg-zinc-800 xl:inline-block dark:bg-white dark:text-black dark:hover:bg-zinc-200">Log out</button>
    <button id="nav-toggle" aria-label="Menu" class="inline-flex items-center justify-center rounded-lg p-2 text-zinc-600 transition hover:bg-zinc-500/10 xl:hidden dark:text-zinc-300">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>`;

  // Stacked menu revealed by the hamburger on narrow screens.
  mobile.innerHTML = `
    <div class="mx-auto max-w-6xl space-y-0.5">
      ${NAV_ITEMS.map(([h, l]) => navLink(h, l, { block: true })).join("")}
      <div class="mt-2 flex items-center justify-between border-t border-zinc-300/70 px-3 pt-2 dark:border-zinc-900">
        <span class="mono truncate text-xs text-zinc-400">${esc(getEmail())}</span>
        <button id="btn-logout-m" class="whitespace-nowrap rounded-full bg-zinc-950 px-4 py-1.5 text-xs font-medium text-white transition hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">Log out</button>
      </div>
    </div>`;
  mobile.classList.add("hidden"); // closed on every navigation

  const logout = () => { clearSession(); navigate("#/home"); };
  document.getElementById("btn-logout").addEventListener("click", logout);
  document.getElementById("btn-logout-m").addEventListener("click", logout);
  document.getElementById("nav-toggle").addEventListener("click", () => mobile.classList.toggle("hidden"));
}

// --- views --------------------------------------------------------------------------------

function renderHome() {
  document.getElementById("main").innerHTML = `
    <div class="text-center">
      <h1 class="serif text-4xl leading-tight sm:text-5xl">Your own <span class="grad italic">CodeAutopsy</span> org.</h1>
      <p class="mx-auto mt-4 max-w-lg text-sm leading-relaxed text-zinc-500 dark:text-zinc-400">Sign up, get an API key, and start indexing decisions — isolated from every other org on this instance.</p>
      <div class="mt-8 flex justify-center gap-3">
        <a href="#/signup" class="rounded-full bg-gradient-to-r from-cyan-500 to-indigo-500 px-6 py-3 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:shadow-lg hover:shadow-cyan-500/20">Sign up →</a>
        <a href="#/login" class="rounded-xl border border-zinc-300 px-6 py-3 text-sm font-medium text-zinc-700 transition hover:-translate-y-0.5 hover:bg-zinc-100 dark:border-zinc-800 dark:text-zinc-300 dark:hover:bg-zinc-900">Log in</a>
      </div>
    </div>`;
}

function renderAuthForm(mode) {
  const isSignup = mode === "signup";
  document.getElementById("main").innerHTML = `
    <div class="mx-auto max-w-sm">
      <h1 class="serif text-center text-3xl">${isSignup ? "Create your org" : "Welcome back"}</h1>
      <p class="mt-2 text-center text-sm text-zinc-500 dark:text-zinc-400">${isSignup ? "One user, one org, isolated from day one." : "Log in to your dashboard."}</p>
      <form id="auth-form" class="card mt-8 grid gap-3">
        <label class="block">
          <span class="mono text-[11px] uppercase tracking-wider text-zinc-400">email</span>
          <input required type="email" id="in-email" class="mt-1 w-full rounded-lg border border-zinc-300 p-2.5 text-sm dark:border-zinc-700" placeholder="you@example.com">
        </label>
        <label class="block">
          <span class="mono text-[11px] uppercase tracking-wider text-zinc-400">password</span>
          <input required type="password" minlength="8" id="in-password" class="mt-1 w-full rounded-lg border border-zinc-300 p-2.5 text-sm dark:border-zinc-700" placeholder="at least 8 characters">
        </label>
        <button type="submit" id="btn-submit" class="mono mt-2 rounded-xl bg-zinc-950 px-5 py-2.5 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-800 disabled:opacity-50 dark:bg-white dark:text-black dark:hover:bg-zinc-200">${isSignup ? "Sign up" : "Log in"}</button>
        <p id="auth-error" class="hidden text-sm text-red-500"></p>
      </form>
      <p class="mt-4 text-center text-sm text-zinc-500 dark:text-zinc-400">
        ${isSignup ? `Already have an account? <a href="#/login" class="text-cyan-600 dark:text-cyan-400">Log in</a>` : `Need an org? <a href="#/signup" class="text-cyan-600 dark:text-cyan-400">Sign up</a>`}
      </p>
    </div>`;

  document.getElementById("auth-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("btn-submit");
    const errEl = document.getElementById("auth-error");
    errEl.classList.add("hidden");
    btn.disabled = true;
    const email = document.getElementById("in-email").value.trim();
    const password = document.getElementById("in-password").value;
    try {
      const data = await api(isSignup ? "/v1/auth/signup" : "/v1/auth/login", {
        method: "POST",
        body: { email, password },
      });
      setSession(data.access_token, email);
      navigate(isSignup ? "#/onboarding" : "#/dashboard");
    } catch (err) {
      errEl.textContent = err.message;
      errEl.classList.remove("hidden");
      btn.disabled = false;
    }
  });
}

async function renderOnboarding() {
  const existingKeys = await api("/v1/keys", { headers: authHeaders() });
  const main = document.getElementById("main");
  main.innerHTML = `
    <div class="mx-auto max-w-xl">
      <h1 class="serif text-3xl">Get your API key</h1>
      <p class="mt-2 text-sm text-zinc-500 dark:text-zinc-400">This is what the Recorder/Enricher use to ingest decisions into your org. Shown once — copy it now.</p>
      <div class="card mt-6">
        ${existingKeys.length
          ? `<p class="mono text-xs text-zinc-400">you already have ${existingKeys.length} key(s) — see Settings to manage them.</p>
             <button id="btn-gen" class="mono mt-4 rounded-xl bg-zinc-950 px-5 py-2.5 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">Generate another key</button>`
          : `<button id="btn-gen" class="mono rounded-xl bg-zinc-950 px-5 py-2.5 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">Generate my API key</button>`}
        <div id="key-out" class="mt-4 hidden">
          <p class="mono text-[11px] uppercase tracking-wider text-amber-500">save this now — it will not be shown again</p>
          <pre id="key-value" class="mono mt-1.5 overflow-x-auto rounded-xl border border-zinc-200 bg-zinc-50 p-3 text-xs dark:border-zinc-800 dark:bg-black/40"></pre>
          <button id="btn-copy" class="mono mt-2 rounded-lg border border-zinc-300 px-3 py-1.5 text-xs font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">Copy key</button>
        </div>
      </div>
      <div id="snippet-wrap" class="card mt-4 ${existingKeys.length ? "" : "hidden"}">
        <div class="flex items-center justify-between">
          <p class="mono text-[11px] uppercase tracking-wider text-zinc-400">ingest a decision</p>
          <button id="btn-copy-snippet" class="mono rounded-lg border border-zinc-300 px-3 py-1.5 text-xs font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">Copy</button>
        </div>
        <pre id="snippet" class="mono mt-2 overflow-x-auto rounded-xl border border-zinc-200 bg-zinc-50 p-3 text-xs leading-6 dark:border-zinc-800 dark:bg-black/40"></pre>
      </div>
      <a href="#/dashboard" class="mono mt-6 inline-block text-sm text-cyan-600 dark:text-cyan-400">Continue to dashboard →</a>
    </div>`;

  function showSnippet(key) {
    const snippet = `curl -X POST ${API}/v1/provenance \\
  -H "X-Api-Key: ${key}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "commit_sha": "<git-sha>",
    "file_path": "app/payment.py",
    "line_start": 40,
    "line_end": 45,
    "decision_span_id": "${hex(16)}",
    "decision_trace_id": "${hex(32)}",
    "session_id": "sess_1",
    "reasoning_summary": "assuming the input is always valid",
    "risk_flags": ["assumed_valid_input"],
    "decision_id": "dec_${hex(8)}"
  }'`;
    document.getElementById("snippet-wrap").classList.remove("hidden");
    document.getElementById("snippet").textContent = snippet;
    document.getElementById("btn-copy-snippet").onclick = (e) => copyToClipboard(snippet, e.currentTarget);
  }

  document.getElementById("btn-gen").addEventListener("click", async (e) => {
    e.target.disabled = true;
    try {
      const created = await api("/v1/keys", { method: "POST", headers: authHeaders(), rawBody: "" });
      document.getElementById("key-out").classList.remove("hidden");
      document.getElementById("key-value").textContent = created.key;

  });

let _dash = { decisions: [], incidents: [], org_id: "" };

function decisionById(id) {
  return _dash.decisions.find((d) => d.decision_id && d.decision_id === id) || null;
}

// Prices a risk flag against every decision + incident indexed so far — the same join
// codeautopsy.prognosis.core.compute_flag_stats() runs server-side for the CLI/PR bot,
// computed here client-side against the org's own dashboard data.
function flagCrashRate(flag) {
  const withFlag = _dash.decisions.filter((d) => (d.risk_flags || []).includes(flag));
  if (withFlag.length < 2) return null;
  const crashedIds = new Set(_dash.incidents.filter((i) => i.decision_id).map((i) => i.decision_id));
  const crashed = withFlag.filter((d) => d.decision_id && crashedIds.has(d.decision_id)).length;
  return { rate: crashed / withFlag.length, samples: withFlag.length };
}

async function renderPrognose() {
  const data = await api("/v1/dashboard", { headers: authHeaders() });
  const decisions = data.decisions || [];
  const incidents = data.incidents || [];
  const crashedIds = new Set(incidents.filter((i) => i.decision_id).map((i) => i.decision_id));

  const MIN_SAMPLES = 2;
  const flagStats = {};
  decisions.forEach((d) => {
    const crashed = !!(d.decision_id && crashedIds.has(d.decision_id));
    (d.risk_flags || []).forEach((f) => {
      const s = flagStats[f] || (flagStats[f] = { decisions: 0, crashed: 0 });
      s.decisions++;
      if (crashed) s.crashed++;
    });
  });
  const rows = Object.entries(flagStats).map(([flag, s]) => ({ flag, ...s, rate: s.crashed / s.decisions }));
  const priced = rows.filter((r) => r.decisions >= MIN_SAMPLES).sort((a, b) => b.rate - a.rate);
  const unpriced = rows.filter((r) => r.decisions < MIN_SAMPLES);

  const CLI_SNIPPET = "codeautopsy prognose origin/main --comment --fail-on-risk";
  const YML_SNIPPET = [
    "on:",
    "  pull_request:",
    "    branches: [main]",
    "",
    "permissions:",
    "  contents: read",
    "  pull-requests: write",
    "",
    "jobs:",
    "  prognose:",
    "    runs-on: ubuntu-latest",
    "    steps:",
    "      - uses: actions/checkout@v4",
    "        with:",
    "          fetch-depth: 0",
    "          ref: ${{ github.event.pull_request.head.sha }}",
    "",
    "      - uses: actions/setup-python@v5",
    "        with:",
    "          python-version: \"3.11\"",
    "",
    "      - run: python -m pip install -e .",
    "",
    "      - env:",
    "          GH_TOKEN: ${{ github.token }}",
    "        run: |",
    "          codeautopsy prognose \"${{ github.event.pull_request.base.sha }}\" \\",
    "            --head \"${{ github.event.pull_request.head.sha }}\" --comment \\",
    "            --pr \"${{ github.event.pull_request.number }}\"",
  ].join("\n");

  const main = document.getElementById("main");
  main.innerHTML = `
    <h1 class="serif text-3xl">Prognosis</h1>
    <p class="mt-2 max-w-2xl text-sm leading-relaxed text-zinc-500 dark:text-zinc-400">
      Autopsy explains a crash after it happens. Prognosis prices the risk <span class="text-zinc-700 dark:text-zinc-200">before it merges</span> —
      it walks a pull request's diff, resolves every added line back to the AI decision that (would) author it via the
      same git-blame join Autopsy uses, then prices its risk flags against every decision + incident your org has indexed so far.
    </p>

    <h2 class="serif mt-8 text-xl">Your org's flag crash rates</h2>
    <p class="mt-1 text-sm text-zinc-500 dark:text-zinc-400">Exactly what a PR comment would price a new line's risk flags against right now, computed live from this dashboard's own data.</p>
    ${rows.length === 0 ? `
      <div class="card mt-3 text-center">
        <p class="text-sm text-zinc-500 dark:text-zinc-400">No risk flags indexed yet — record a decision with <span class="mono">--risk-flag</span>, or run a Live Autopsy, to start pricing.</p>
      </div>` : `
      <div class="card mt-3 !p-0 overflow-hidden">
        <table class="w-full text-left text-sm">
          <thead class="mono text-[11px] uppercase tracking-wider text-zinc-400">
            <tr><th class="px-4 py-3">flag</th><th class="px-4 py-3">historical crash rate</th><th class="px-4 py-3">samples</th></tr>
          </thead>
          <tbody>
            ${priced.map((r) => `
              <tr class="border-t border-zinc-200/80 dark:border-zinc-800/80">
                <td class="px-4 py-3 mono text-xs">${esc(r.flag)}</td>
                <td class="px-4 py-3"><span class="font-medium ${r.rate > 0 ? "text-amber-600 dark:text-amber-300" : "text-emerald-600 dark:text-emerald-300"}">${Math.round(r.rate * 100)}%</span></td>
                <td class="px-4 py-3 mono text-xs text-zinc-400">${r.decisions}</td>
              </tr>`).join("")}
            ${unpriced.map((r) => `
              <tr class="border-t border-zinc-200/80 dark:border-zinc-800/80">
                <td class="px-4 py-3 mono text-xs">${esc(r.flag)}</td>
                <td class="px-4 py-3 text-xs text-zinc-400">fewer than ${MIN_SAMPLES} decisions — not priced yet</td>
                <td class="px-4 py-3 mono text-xs text-zinc-400">${r.decisions}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      </div>`}

    <h2 class="serif mt-10 text-xl">Wire it into CI</h2>
    <p class="mt-1 text-sm text-zinc-500 dark:text-zinc-400">Runs on every PR against <span class="mono">main</span>, comments the priced report, and can fail the check on any nonzero-priced flag.</p>
    <div class="mt-3">
      <div class="flex items-center justify-end"><button data-copy="snip-prognose-cli" class="mono rounded-lg border border-zinc-300 px-3 py-1 text-[11px] font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">Copy</button></div>
      <pre id="snip-prognose-cli" class="mono mt-1.5 overflow-x-auto rounded-xl border border-zinc-200 bg-zinc-50 p-3 text-xs leading-6 dark:border-zinc-800 dark:bg-black/40"></pre>
    </div>
    <div class="mt-4">
      <div class="flex items-center justify-end"><button data-copy="snip-prognose-yml" class="mono rounded-lg border border-zinc-300 px-3 py-1 text-[11px] font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">Copy</button></div>
      <pre id="snip-prognose-yml" class="mono mt-1.5 overflow-x-auto rounded-xl border border-zinc-200 bg-zinc-50 p-3 text-xs leading-6 dark:border-zinc-800 dark:bg-black/40"></pre>
    </div>

    <a href="#/dashboard" class="mono mt-6 inline-block text-sm text-cyan-600 dark:text-cyan-400">Back to dashboard →</a>
  `;
  document.getElementById("snip-prognose-cli").textContent = CLI_SNIPPET;
  document.getElementById("snip-prognose-yml").textContent = YML_SNIPPET;
  main.querySelectorAll("[data-copy]").forEach((btn) =>
    btn.addEventListener("click", (e) =>
      copyToClipboard(document.getElementById(btn.dataset.copy).textContent, e.currentTarget)
    )
  );
}

function healStatusBadge(status) {
  const map = {
    triggered: ["Triggered", "border-amber-300 bg-amber-400/10 text-amber-600 dark:border-amber-700 dark:text-amber-300"],
    dispatched: ["Fix Bot running", "border-cyan-300 bg-cyan-400/10 text-cyan-600 dark:border-cyan-700 dark:text-cyan-300"],
    succeeded: ["Healed — PR open", "border-emerald-300 bg-emerald-400/10 text-emerald-600 dark:border-emerald-700 dark:text-emerald-300"],
    failed: ["Fix failed", "border-rose-300 bg-rose-400/10 text-rose-600 dark:border-rose-700 dark:text-rose-300"],
    dispatch_failed: ["Dispatch skipped", "border-zinc-300 bg-zinc-400/10 text-zinc-500 dark:border-zinc-700 dark:text-zinc-400"],
  };
  const [label, cls] = map[status] || [status, "border-zinc-300 text-zinc-500 dark:border-zinc-700"];
  const live = (status === "triggered" || status === "dispatched")
    ? `<span class="ml-1.5 inline-block h-1.5 w-1.5 animate-pulse rounded-full bg-current"></span>` : "";
  return `<span class="mono inline-flex items-center rounded-full border px-2.5 py-1 text-[11px] font-medium ${cls}">${esc(label)}${live}</span>`;
}

function healEventsHTML(events) {
  if (!events || !events.length) return "";
  return `<ol class="mt-3 space-y-2 border-l border-zinc-200 pl-4 dark:border-zinc-800">
    ${events.map(e => {
      let t = "";
      try { t = new Date(e.ts).toLocaleTimeString(); } catch { t = ""; }
      return `<li class="relative">
        <span class="absolute -left-[21px] top-1 h-2 w-2 rounded-full bg-zinc-300 dark:bg-zinc-600"></span>
        <p class="text-xs text-zinc-700 dark:text-zinc-200">${esc(e.label)}</p>
        ${e.detail ? `<p class="mono mt-0.5 text-[11px] text-zinc-400 break-all">${esc(e.detail)}</p>` : ""}
        <p class="mono text-[10px] text-zinc-400">${esc(t)}</p>
      </li>`;
    }).join("")}
  </ol>`;
}

async function pollHealRuns() {
  const wrap = document.getElementById("ah-runs");
  if (!wrap || location.hash !== "#/autoheal") return;
  try {
    const data = await api("/v1/heal/runs", { headers: authHeaders() });
    const runs = data.runs || [];
    wrap.innerHTML = runs.length
      ? runs.map(healRunHTML).join("")
      : `<div class="card"><p class="text-sm text-zinc-400">No heal runs yet. Trigger one above — or crash the sample app and let the SigNoz alert fire this automatically.</p></div>`;
    // Keep polling while any run is still in flight (or always, cheaply, so real webhook
    // runs appear too). Re-check we're still on the page each tick.
    if (document.getElementById("ah-runs") && location.hash === "#/autoheal") {
      _healPollTimer = setTimeout(pollHealRuns, 3000);
    }
  } catch (e) {
    if (document.getElementById("ah-runs") && location.hash === "#/autoheal") {
      _healPollTimer = setTimeout(pollHealRuns, 5000);
    }
  }
}

    </div>
    <p id="ah-status" class="mt-2 text-xs text-zinc-400"></p>

    <div id="ah-runs" class="mt-6 space-y-4"><div class="card"><p class="text-sm text-zinc-400">Loading heal runs…</p></div></div>
    <a href="#/dashboard" class="mono mt-6 inline-block text-sm text-cyan-600 dark:text-cyan-400">Back to dashboard →</a>
  `;

  const btn = document.getElementById("ah-trigger");
  btn.addEventListener("click", async () => {
    const status = document.getElementById("ah-status");
    status.textContent = "Triggering…";
    btn.disabled = true;
    try {
      await api("/v1/heal/trigger", { method: "POST", headers: authHeaders(), body: {} });
      status.textContent = "Heal run started — watch the timeline below.";
      stopHealPoll();
      await pollHealRuns();
    } catch (e) {
      status.textContent = e.message;
    } finally {
      btn.disabled = false;
    }
  });

  await pollHealRuns();
}

async function renderSettings() {
  const [me, keys] = await Promise.all([
    api("/v1/me", { headers: authHeaders() }),
    api("/v1/keys", { headers: authHeaders() }),
  ]);
  const main = document.getElementById("main");
  main.innerHTML = `
    <h1 class="serif text-3xl">Settings</h1>

    <div class="card mt-6">
      <p class="mono text-[11px] uppercase tracking-wider text-zinc-400">org</p>
      <p class="mt-1 text-sm">${esc(me.org.name)}</p>
      <p class="mono mt-1 text-xs text-zinc-400">${esc(me.org.id)}</p>
      <p class="mono mt-3 text-[11px] uppercase tracking-wider text-zinc-400">signed in as</p>
      <p class="mt-1 text-sm">${esc(me.user.email)}</p>
    </div>

    <div class="card mt-4">
      <div class="flex items-center justify-between">
        <p class="mono text-[11px] uppercase tracking-wider text-zinc-400">API keys</p>
        <button id="btn-new-key" class="mono rounded-lg border border-zinc-300 px-3 py-1.5 text-xs font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">+ New key</button>
      </div>
      <div id="key-created" class="mt-3 hidden rounded-xl border border-amber-400/40 bg-amber-400/10 p-3">
        <p class="mono text-[11px] text-amber-600 dark:text-amber-300">save this now — it will not be shown again</p>
        <pre id="key-created-value" class="mono mt-1 overflow-x-auto text-xs"></pre>
        <button id="btn-copy-new-key" class="mono mt-2 rounded-lg border border-amber-400/40 px-3 py-1.5 text-xs font-medium text-amber-600 transition hover:bg-amber-400/10 dark:text-amber-300">Copy key</button>
      </div>
      <div id="key-list" class="mt-3 grid gap-2"></div>
    </div>
  `;

  function renderKeyList(list) {
    const el = document.getElementById("key-list");
    if (!list.length) {
      el.innerHTML = `<p class="text-sm text-zinc-500 dark:text-zinc-400">No keys yet.</p>`;
      return;
    }
    el.innerHTML = list.map((k) => `
      <div class="flex items-center justify-between rounded-lg border border-zinc-200 px-3 py-2 dark:border-zinc-800">
        <div>
          <span class="mono text-sm">ca_live_${esc(k.prefix)}…</span>
          <span class="mono block text-[11px] text-zinc-400">created ${fmtDate(k.created_at)}${k.last_used_at ? " · last used " + fmtDate(k.last_used_at) : " · never used"}</span>
        </div>
        <button data-id="${esc(k.id)}" class="btn-revoke mono text-xs text-red-500 hover:text-red-600">Revoke</button>
      </div>`).join("");
    el.querySelectorAll(".btn-revoke").forEach((btn) => {
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        await api("/v1/keys/" + btn.dataset.id, { method: "DELETE", headers: authHeaders() });
        renderSettings();
      });
    });
  }

  renderKeyList(keys);

  document.getElementById("btn-new-key").addEventListener("click", async (e) => {
    e.target.disabled = true;
    try {
      const created = await api("/v1/keys", { method: "POST", headers: authHeaders(), rawBody: "" });
      document.getElementById("key-created").classList.remove("hidden");
      document.getElementById("key-created-value").textContent = created.key;
      document.getElementById("btn-copy-new-key").onclick = (ev) => copyToClipboard(created.key, ev.currentTarget);
      renderKeyList(await api("/v1/keys", { headers: authHeaders() }));
    } finally {
      e.target.disabled = false;
    }
  });
}

async function renderIntegrate() {
  const keys = await api("/v1/keys", { headers: authHeaders() });
  const INSTALL = "pip install git+https://github.com/aniket-3001/codeautopsy.git";
  const main = document.getElementById("main");

  const step = (n, title, sub, body) => `
    <div class="card mt-4">
      <div class="flex items-start gap-3">
        <span class="mono grid h-7 w-7 shrink-0 place-items-center rounded-full bg-gradient-to-br from-cyan-500 to-indigo-500 text-xs font-semibold text-white">${n}</span>
        <div class="min-w-0 flex-1">
          <p class="text-sm font-medium">${title}</p>
          <p class="mt-0.5 text-xs text-zinc-500 dark:text-zinc-400">${sub}</p>
          ${body}
        </div>
      </div>
    </div>`;

  const block = (id) => `
    <div class="mt-3">
      <div class="flex items-center justify-end">
        <button data-copy="${id}" class="mono rounded-lg border border-zinc-300 px-3 py-1 text-[11px] font-medium transition hover:bg-zinc-100 dark:border-zinc-700 dark:hover:bg-zinc-900">Copy</button>
      </div>
      <pre id="${id}" class="mono mt-1.5 overflow-x-auto rounded-xl border border-zinc-200 bg-zinc-50 p-3 text-xs leading-6 dark:border-zinc-800 dark:bg-black/40"></pre>
    </div>`;

  main.innerHTML = `
    <h1 class="serif text-3xl">Integrate in 3 steps</h1>
    <p class="mt-2 max-w-2xl text-sm text-zinc-500 dark:text-zinc-400">
      Install the package, record the reasoning behind your code, and let crashes trace themselves back to it.
      Snippets below are filled with <span class="font-medium">your org's API key</span> once you reveal one.
    </p>

    <div class="card mt-6 flex flex-wrap items-center justify-between gap-3 border-cyan-400/30 bg-cyan-400/5">
      <div>
        <p class="mono text-[11px] uppercase tracking-wider text-zinc-400">your API key</p>
        <p id="key-state" class="mono mt-1 text-sm">${keys.length ? "hidden — reveal a fresh key to fill the snippets" : "no key yet — generate one to fill the snippets"}</p>
      </div>
      <button id="btn-reveal" class="mono rounded-xl bg-zinc-950 px-4 py-2 text-sm font-medium text-white transition hover:-translate-y-0.5 hover:bg-zinc-800 dark:bg-white dark:text-black dark:hover:bg-zinc-200">${keys.length ? "Generate a new key" : "Generate my API key"}</button>
    </div>

    ${step(1, "Install CodeAutopsy", "No PyPI account needed — install straight from the repo.", block("snip-install"))}
    ${step(2, "Record a decision (any agent)", "Log why a line range was written the way it was. Works from any tool, script, or human — not just Claude Code.", block("snip-record") + `<p class="mt-2 text-xs text-zinc-500 dark:text-zinc-400">Using Claude Code? Its PostToolUse hook records decisions automatically — no manual <span class="mono">record</span> needed.</p>`)}
    ${step(3, "Enrich your crashes", "Wrap the risky path. On an exception it resolves the crashing line to its decision, links the trace in SigNoz, and posts an incident to your dashboard.", block("snip-enrich"))}

    <a href="#/dashboard" class="mono mt-6 inline-block text-sm text-cyan-600 dark:text-cyan-400">Back to dashboard →</a>`;

  function fill(key) {
    const K = key || "<YOUR_API_KEY>";
    document.getElementById("snip-install").textContent = INSTALL;
    document.getElementById("snip-record").textContent =
`codeautopsy record \\
  --commit $(git rev-parse HEAD) \\
  --file app/checkout.py --lines 40-46 \\
  --reasoning "assumed discount_code is always present" \\
  --risk-flag assumed_valid_input \\
  --api-key ${K}`;
    document.getElementById("snip-enrich").textContent =
`import os
from codeautopsy.enricher import autopsy_exception

# set once in your deploy environment:
#   CODEAUTOPSY_PROVENANCE_URL  = ${API}
#   CODEAUTOPSY_API_KEY         = ${K}
#   OTEL_EXPORTER_OTLP_ENDPOINT = https://ingest.<region>.signoz.cloud:443
#   SIGNOZ_INGESTION_KEY        = <your-signoz-ingestion-key>

try:
    charge(order)                       # your code
except Exception as exc:
    autopsy_exception(
        exc,
        commit_sha=os.environ["GIT_SHA"],   # the deployed commit
        file_path="app/checkout.py",
        line=42,
    )
    raise`;
  }

  fill(null);
  main.querySelectorAll("[data-copy]").forEach((btn) =>
    btn.addEventListener("click", (e) =>
      copyToClipboard(document.getElementById(btn.dataset.copy).textContent, e.currentTarget)
    )
  );

  document.getElementById("btn-reveal").addEventListener("click", async (e) => {
    e.target.disabled = true;
    try {
      const created = await api("/v1/keys", { method: "POST", headers: authHeaders(), rawBody: "" });
      fill(created.key);
      document.getElementById("key-state").textContent = created.key + "  (shown once — snippets now filled)";
    } finally {
      e.target.disabled = false;
    }
  });
}

window.addEventListener("hashchange", render);
render();
</script>
</body>
</html>
